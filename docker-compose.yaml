services:
  mysql:
    image: mysql:8.0
    container_name: studiobook_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: studiobook
      MYSQL_USER: studiobook
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    image: php:8.2-cli
    container_name: studiobook_backend
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    command: php artisan serve --host=0.0.0.0 --port=8000

  frontend:
    image: node:20-alpine
    container_name: studiobook_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: npm run dev -- --host

volumes:
  mysql_data: